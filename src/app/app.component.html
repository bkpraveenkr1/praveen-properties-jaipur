<nav class="navbar">
  <div class="logo" routerLink="/">
    <img src="assets/logo.png" alt="Praveen Properties Jaipur Logo" class="logo" />
  </div>

  <ul class="nav-links">
    <li><a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">{{ 'NAV_PROPERTIES' | translate }}</a></li>
    <li><a routerLink="/about-me" routerLinkActive="active">{{ 'NAV_ABOUT' | translate }}</a></li>
    <li><a routerLink="/contact" routerLinkActive="active">{{ 'NAV_CONTACT' | translate }}</a></li>
  </ul>

  <div class="header-right">
    <div class="lang-switch" (click)="toggleLanguage()">
      <div class="active-indicator" [class.hindi]="currentLanguage() === 'HI'"></div>
      <span class="lang-text" [class.active]="currentLanguage() === 'EN'">EN</span>
      <span class="lang-text" [class.active]="currentLanguage() === 'HI'">HI</span>
    </div>
  </div>
</nav>

<main>
  <router-outlet></router-outlet>
</main>

<footer class="footer">
  <div class="footer-content">
    <p>&copy; 2026 Praveen Properties Jaipur</p>
    <p class="footer-note">Direct deals | No brokerage</p>
  </div>
</footer>

<app-sticky-contact></app-sticky-contact>
